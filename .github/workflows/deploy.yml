name: "AWS RDS Deploy"

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to run this manually from the GitHub UI

jobs:
  terraform:
    name: "Terraform Deployment"
    runs-on: ubuntu-latest
    
    env:
      # Ensures compatibility with Node.js 24 runners in 2026
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Maps your GitHub Secret to the Terraform variable
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0" # Specify a version for consistency
          terraform_wrapper: false   # Setting to false avoids issues with output formatting in logs

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check # Good practice: ensures your code is formatted correctly

      - name: Terraform Plan
        id: plan
        run: terraform plan -input=false

      - name: Terraform Apply
        # Only run Apply if the push was to the 'main' branch
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -input=false